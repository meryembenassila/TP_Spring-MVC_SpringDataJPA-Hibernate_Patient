<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
</head>
<body>
<div class="m-2">
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Date</th>
            <th scope="col">Malade</th>
            <th scope="col">Actions</th>


        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${patients}">
            <th scope="row" th:text="${p.id}"> </th>
            <td th:text="${p.nom}"></td>
            <td th:text="${p.dateNaissance}"></td>
            <td th:text="${p.malade}"></td>
            <td>
                <a class="btn btn-primary" th:href="@{/rendezvous/{id}(id=${p.id})}">
                    Voir rendez-vous
                </a>
            </td>

        </tr>

        </tbody>
    </table>

</div>

</body>
</html>
