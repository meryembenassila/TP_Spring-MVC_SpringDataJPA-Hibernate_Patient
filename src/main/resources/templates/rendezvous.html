<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
</head>
<body>
<div class="ms-2">
    <table class="table table-hover">
        <thead>
        <tr>
            <th scope="col">Date</th>
            <th scope="col">Patient</th>
            <th scope="col">Médecin</th>
            <th scope="col">Status</th>



        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${rendezVous}">
            <td th:text="${#dates.format(r.date, 'dd/MM/yyyy')}"></td>
            <td th:text="${r.patient.nom}"></td>
            <td th:text="${r.medecin.nom}"></td>
            <td th:text="${r.status}"></td>
        </tr>

        </tbody>
    </table>

</div>

</body>
</html>
